<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../CSS/output.css">
</head>

<body class="bg-[#EFF2F5] antialiased min-h-screen flex flex-col relative">

    <div class="w-full px-6 md:px-12 pt-8">
        <a href="javascript:history.back()"
            class="inline-flex items-center gap-2 font-bold text-xs uppercase tracking-widest group"
            style="color: var(--color-main-color);">
            <span class="transition-transform duration-300 group-hover:-translate-x-1">
                &larr;
            </span>
            <span class="relative">
                Back
                <span class="absolute left-0 -bottom-1 w-0 h-[2px] transition-all duration-300 group-hover:w-full"
                    style="background-color: var(--color-main-color);"></span>
            </span>
        </a>
    </div>

    <div class="flex-grow flex items-center justify-center p-6">
        <main class="bg-white w-full max-w-[480px] rounded-sm p-12 md:p-16 shadow-sm">

            <header class="mb-10 text-left">
                <h1 class="text-3xl font-extrabold text-[#1A1D1F] mb-3 tracking-tight">Back to your digital life</h1>
                <p class="text-gray-500 text-base font-light">Choose one of the option to go</p>
            </header>

            <form id="register-form" action="#" class="space-y-4">
                <input type="text" placeholder="Create username" class="input-field">
                <input type="email" placeholder="email" class="input-field">
                <input type="password" placeholder="New password" class="input-field">
                <input type="password" placeholder="Repeat password" class="input-field">

                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-100"></div>
                    </div>
                    <div class="relative flex justify-start"><span
                            class="bg-white pr-3 text-sm text-gray-500 font-light">Or register with</span></div>
                </div>

                <div class="grid grid-cols-2 gap-4 pb-6">
                    <button type="button" class="soc-btn">
                        <img src="../Images/icons/Google.svg" alt="Google" class="h-5 w-5">
                    </button>
                    <button type="button" class="disabled">
                        <img src="../Images/icons/Apple.svg" alt="Apple" class="h-5 w-5">
                    </button>
                </div>

                <button type="submit" class="btn-primary">Register</button>
            </form>

            <footer class="mt-8 text-center text-sm text-gray-500 font-light">
                Already have an account?
                <a href="Login.html" class="font-medium hover:underline" style="color: var(--color-main-color);">Log
                    in</a>
            </footer>
        </main>
    </div>




    <script type="module" src="../JavaScript/auth.js"></script>
</body>

</html>
